<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeterna - Masterpiece Audio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --primary: #ffffff;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #2997ff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; /* Custom cursor */ }
        
        ::-webkit-scrollbar { width: 0px; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden; 
            min-width: 1280px; 
            zoom: 0.75;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.05), transparent 60%),
                radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.02), transparent 40%);
        }

        /* CUSTOM CURSOR */
        .cursor-dot {
            position: fixed; top: 0; left: 0; width: 8px; height: 8px;
            background: #fff; border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: transform 0.1s;
        }
        .cursor-ring {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.4); border-radius: 50%;
            pointer-events: none; z-index: 9998;
            transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, border-color 0.3s;
        }

        /* NAVBAR */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 30px 80px; position: sticky; top: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: 10px; color: #fff; }
        .nav-links { display: flex; gap: 60px; }
        .nav-links a { 
            color: var(--text-muted); text-decoration: none; font-size: 0.85rem; 
            text-transform: uppercase; font-weight: 600; letter-spacing: 3px; 
            position: relative; transition: color 0.4s;
        }
        .nav-links a:hover, .nav-links a.active { color: #fff; }
        
        /* HERO SECTION */
        .hero { 
            display: flex; padding: 0 80px; gap: 60px; min-height: 90vh; 
            align-items: center; position: relative; 
        }
        
        .product-info { flex: 1; display: flex; flex-direction: column; gap: 40px; z-index: 10; }
        .tag { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 6px; color: var(--text-muted); }
        .title { font-size: 7rem; font-weight: 900; line-height: 0.9; letter-spacing: -3px; color: #fff; }
        .title span { color: #333; font-weight: 300; }
        .price { font-size: 2.5rem; font-weight: 300; color: #fff; }
        .desc { font-size: 1.3rem; color: var(--text-muted); line-height: 1.8; font-weight: 300; max-width: 90%; }
        
        /* MAGNETIC BUTTON */
        .magnetic-wrap { display: inline-block; align-self: flex-start; padding: 20px; margin: -20px; }
        .btn-add { 
            background: #fff; color: #000; border: none; 
            padding: 24px 50px; font-size: 0.95rem; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 3px; border-radius: 100px; display: inline-flex; align-items: center; gap: 15px; 
            transition: background 0.3s, color 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }
        .btn-add:hover { background: var(--accent); color: #fff; box-shadow: 0 20px 40px rgba(41, 151, 255, 0.4); }

        /* COLOR PICKER */
        .color-picker { display: flex; gap: 30px; align-items: center; }
        .color-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); }
        .color-options { display: flex; gap: 20px; }
        .color-dot { 
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); 
            display: flex; align-items: center; justify-content: center; position: relative;
            transition: 0.4s;
        }
        .color-dot::after {
            content: ''; position: absolute; width: 48px; height: 48px; border-radius: 50%;
            border: 1px solid #fff; opacity: 0; transform: scale(0.8); transition: 0.4s;
        }
        .color-dot.active::after { opacity: 1; transform: scale(1); }

        /* -----------------------------------------------------------
           ULTRA REALISTIC 3D PHYSICS SHOWCASE
        -------------------------------------------------------------*/
        .product-showcase { 
            flex: 1.3; height: 850px; position: relative; 
            display: flex; align-items: center; justify-content: center; 
            perspective: 1500px; 
        }

        /* Ambient glowing backdrop */
        .ambient-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 700px; height: 700px; border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.06) 0%, transparent 60%);
            pointer-events: none; z-index: 1;
        }

        /* The main 3D rotational container */
        .headphone-rig {
            position: relative; width: 600px; height: 700px;
            transform-style: preserve-3d; z-index: 10;
        }

        /* The actual image wrapper */
        .headphone-asset {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d;
        }

        .headphone-img {
            width: 100%; height: 100%; object-fit: contain;
            /* Base dynamic shadow - will be updated via JS */
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.8));
            transform: translateZ(80px); /* Pushes the image forward in 3D space */
        }

        /* Faux Specular Reflection (Light Glare) mapped via JS */
        .glare-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            mix-blend-mode: overlay; opacity: 0;
            border-radius: 50%; transform: translateZ(81px); pointer-events: none;
            transition: opacity 0.5s;
        }

        /* Floor Shadow simulating distance */
        .floor-shadow {
            position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%) rotateX(70deg);
            width: 400px; height: 150px;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 70%);
            filter: blur(15px); z-index: 1; pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <div class="navbar">
        <div class="logo">AETERNA</div>
        <div class="nav-links">
            <a href="#" class="active hover-target">Visão Geral</a>
            <a href="#" class="hover-target">Engenharia</a>
            <a href="#" class="hover-target">Acústica</a>
        </div>
        <div class="cart-icon hover-target">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        </div>
    </div>
    
    <div class="hero">
        <div class="product-info">
            <div class="tag">Engenharia Acústica</div>
            <h1 class="title">Orbital<br><span>NC-1 Pro</span></h1>
            <div class="price"><span>R$</span> 2.499,00</div>
            <p class="desc">Nossa arquitetura de áudio mais avançada. Usinado em alumínio aeroespacial puro, com drivers de grafeno que recriam o som com precisão nanométrica e realismo absoluto.</p>
            
            <div class="color-picker">
                <span class="color-label">Acabamento:</span>
                <div class="color-options">
                    <div class="color-dot active hover-target" data-color="spacegray" style="background-color: #555555;"></div>
                    <div class="color-dot hover-target" data-color="silver" style="background-color: #e3e4e5;"></div>
                    <div class="color-dot hover-target" data-color="blue" style="background-color: #7b8e9b;"></div>
                </div>
            </div>
            
            <div class="magnetic-wrap hover-target" id="magneticBtn">
                <button class="btn-add">
                    Comprar Agora
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </div>
        </div>
        
        <div class="product-showcase">
            <div class="ambient-glow"></div>
            
            <!-- The 3D Rig -->
            <div class="headphone-rig" id="headphoneRig">
                <div class="headphone-asset" id="headphoneAsset">
                    <img id="productImage" src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/airpods-max-select-spacegray-202011?wid=940&hei=1112&fmt=png-alpha&.v=1604709508000" alt="Headphone" class="headphone-img">
                    <div class="glare-overlay" id="glare"></div>
                </div>
            </div>
            
            <div class="floor-shadow" id="floorShadow"></div>
        </div>
    </div>

    <!-- HIGH PERFORMANCE PHYSICS SCRIPT -->
    <script>
        // Custom Cursor Logic
        const dot = document.getElementById('cursorDot');
        const ring = document.getElementById('cursorRing');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let ringX = mouseX;
        let ringY = mouseY;
        let isHovering = false;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            dot.style.transform = `translate(calc(${mouseX}px - 50%), calc(${mouseY}px - 50%))`;
        });

        // Hover targets expand the cursor ring
        const hoverTargets = document.querySelectorAll('.hover-target');
        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', () => {
                isHovering = true;
                ring.style.width = '60px'; ring.style.height = '60px';
                ring.style.backgroundColor = 'rgba(255,255,255,0.1)';
            });
            target.addEventListener('mouseleave', () => {
                isHovering = false;
                ring.style.width = '40px'; ring.style.height = '40px';
                ring.style.backgroundColor = 'transparent';
            });
        });

        // Render loop for smooth cursor easing
        function renderCursor() {
            ringX += (mouseX - ringX) * 0.15;
            ringY += (mouseY - ringY) * 0.15;
            ring.style.transform = `translate(calc(${ringX}px - 50%), calc(${ringY}px - 50%))`;
            requestAnimationFrame(renderCursor);
        }
        renderCursor();

        // Magnetic Button Physics
        const magnet = document.getElementById('magneticBtn');
        const magnetBtn = magnet.querySelector('.btn-add');
        magnet.addEventListener('mousemove', (e) => {
            const rect = magnet.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            magnetBtn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });
        magnet.addEventListener('mouseleave', () => {
            magnetBtn.style.transform = `translate(0px, 0px)`;
            magnetBtn.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            setTimeout(() => magnetBtn.style.transition = '', 500);
        });

        /* 
           ADVANCED 3D PHYSICS ENGINE FOR HEADPHONE
           Simulates weighty rotation, dynamic shadow, and moving glare based on mouse position
        */
        const rig = document.getElementById('headphoneRig');
        const asset = document.getElementById('headphoneAsset');
        const glare = document.getElementById('glare');
        const image = document.getElementById('productImage');
        const floorShadow = document.getElementById('floorShadow');
        
        let targetRotateX = 0;
        let targetRotateY = 0;
        let currentRotateX = 0;
        let currentRotateY = 0;
        
        // Idle animation variables
        let time = 0;
        let isRigHovered = false;

        rig.addEventListener('mouseenter', () => {
            isRigHovered = true;
            glare.style.opacity = '1';
        });

        rig.addEventListener('mousemove', (e) => {
            const rect = rig.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Map mouse position to intense 3D rotation (up to 35 degrees)
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            targetRotateX = ((y - centerY) / centerY) * -35;
            targetRotateY = ((x - centerX) / centerX) * 35;
        });

        rig.addEventListener('mouseleave', () => {
            isRigHovered = false;
            glare.style.opacity = '0';
            targetRotateX = 0;
            targetRotateY = 0;
        });

        // Render loop for 3D Rig Physics
        function renderPhysics() {
            time += 0.02;

            if (!isRigHovered) {
                // Apply a natural, slow floating breathing effect when idle
                targetRotateX = Math.sin(time) * 5;
                targetRotateY = Math.cos(time) * 5;
            }

            // Smooth spring physics interpolation
            currentRotateX += (targetRotateX - currentRotateX) * 0.08;
            currentRotateY += (targetRotateY - currentRotateY) * 0.08;

            // Apply 3D transform to asset
            asset.style.transform = `rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg)`;
            
            // Dynamically adjust the drop-shadow based on the tilt for extreme realism
            const shadowX = currentRotateY * -1;
            const shadowY = currentRotateX * 1;
            image.style.filter = `drop-shadow(${shadowX}px ${shadowY + 40}px 30px rgba(0,0,0,0.8))`;

            // Adjust floor shadow width and position based on rotation
            const floorScale = 1 - Math.abs(currentRotateX) * 0.005;
            const floorX = currentRotateY * 0.5;
            floorShadow.style.transform = `translateX(calc(-50% + ${floorX}px)) rotateX(70deg) scale(${floorScale})`;

            // Map glare translation based on rotation
            const glareX = currentRotateY * -2;
            const glareY = currentRotateX * 2;
            glare.style.backgroundPosition = `${glareX}px ${glareY}px`;

            requestAnimationFrame(renderPhysics);
        }
        renderPhysics();

        // Color swap logic
        const dots = document.querySelectorAll('.color-dot');
        const imagesSrc = {
            'spacegray': 'https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/airpods-max-select-spacegray-202011?wid=940&hei=1112&fmt=png-alpha&.v=1604709508000',
            'silver': 'https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/airpods-max-select-silver-202011?wid=940&hei=1112&fmt=png-alpha&.v=1604021221000',
            'blue': 'https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/airpods-max-select-skyblue-202011?wid=940&hei=1112&fmt=png-alpha&.v=1604022222000'
        };
        
        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                dots.forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                
                // Fancy swipe transition
                image.style.transition = 'opacity 0.3s, transform 0.5s';
                image.style.opacity = '0';
                image.style.transform = 'translateZ(0px) scale(0.9)';
                
                setTimeout(() => {
                    image.src = imagesSrc[dot.getAttribute('data-color')];
                    image.style.opacity = '1';
                    image.style.transform = 'translateZ(80px) scale(1)';
                }, 300);
            });
        });

    </script>
</body>
</html>
